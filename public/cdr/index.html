<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page CDR - Contoh</title>
    <style>
        body {
            background-color: #020617;
            color: #f8fafc;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        .card {
            background-color: #0f172a;
            border: 1px solid #1e293b;
            padding: 40px;
            border-radius: 16px;
            max-width: 500px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }
        h1 {
            color: #fbbf24;
            margin-top: 0;
        }
        p {
            color: #94a3b8;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            background-color: #fbbf24;
            color: #020617;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 20px;
            transition: all 0.2s;
        }
        .btn:hover {
            background-color: #f59e0b;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Halaman Baru /cdr</h1>
        <p>Ini adalah contoh landing page kustom mandiri yang diunggah ke dalam folder <code>/public/cdr</code>.</p>
        <p>Halaman ini berjalan menggunakan file <code>index.html</code>, CSS, dan JS-nya sendiri, terpisah sepenuhnya dari aplikasi React utama!</p>
        <a href="/" class="btn">Kembali ke Beranda</a>
    </div>

    <script>
        console.log("Script kustom halaman /cdr berhasil dimuat!");
    </script>
</body>
</html>
